name: Automated Training & Sync

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'models/**'
      - 'results/**'
      - 'README.md'
      - 'walkthrough.md'
      - 'implementation_plan.md'
  workflow_dispatch: # Allow manual trigger
    inputs:
      reset:
        description: 'Reset training and start from scratch'
        required: false
        type: boolean
        default: false

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y swig

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Checkpoint Status
      run: |
        if [ -f "models/checkpoint.pth" ]; then
          echo "📦 Checkpoint Status: FOUND"
          if [ -f "results/training_log.csv" ]; then
            LAST_EPISODE=$(tail -n 1 results/training_log.csv | cut -d',' -f1)
            echo "   Last Episode: $LAST_EPISODE (resuming training)"
          else
            echo "   Warning: No training log found"
          fi
        else
          echo "🆕 Checkpoint Status: NOT FOUND (starting fresh)"
        fi

    - name: Run Training
      run: |
        python train.py ${{ github.event.inputs.reset == 'true' && '--reset' || '' }}

    - name: Commit & Push Progress
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "model: auto-update trained weights [skip ci]"
        file_pattern: 'models/checkpoint.pth results/training_log.csv'
        skip_dirty_check: false    
        skip_fetch: true          
